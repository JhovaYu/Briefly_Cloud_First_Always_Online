services:
  workspace-service:
    build:
      context: ./apps/backend/workspace-service
      dockerfile: Dockerfile
    container_name: workspace-service
    ports:
      - "8001:8001"
    environment:
      - SERVICE_PORT=8001
      - LOG_LEVEL=INFO
      - ENVIRONMENT=local
      - SHARED_SECRET=${SHARED_SECRET:-changeme}
      - SUPABASE_URL=https://gcbwysprkqsfakaqsara.supabase.co
      - SUPABASE_JWT_ISSUER=https://gcbwysprkqsfakaqsara.supabase.co/auth/v1
      - SUPABASE_JWT_AUDIENCE=authenticated
      - SUPABASE_AUTH_STRATEGY=jwks
      - SUPABASE_JWKS_URL=https://gcbwysprkqsfakaqsara.supabase.co/auth/v1/.well-known/jwks.json
      - WORKSPACE_STORE_TYPE=${WORKSPACE_STORE_TYPE:-in_memory}
      - WORKSPACE_DATABASE_URL=${WORKSPACE_DATABASE_URL:-}
    mem_limit: 128m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - briefly-internal

  collaboration-service:
    build:
      context: ./apps/backend/collaboration-service
      dockerfile: Dockerfile
    container_name: collaboration-service
    ports:
      - "8002:8002"
    environment:
      - SERVICE_PORT=8002
      - LOG_LEVEL=INFO
      - ENVIRONMENT=local
      - SHARED_SECRET=${SHARED_SECRET:-changeme}
      - ENABLE_EXPERIMENTAL_CRDT_ENDPOINT=${ENABLE_EXPERIMENTAL_CRDT_ENDPOINT:-false}
      - TICKET_TTL_SECONDS=${TICKET_TTL_SECONDS:-60}
      - DOCUMENT_STORE_TYPE=${DOCUMENT_STORE_TYPE:-local}
      - DOCUMENT_STORE_PATH=${DOCUMENT_STORE_PATH:-/data/collab-snapshots}
      - DOCUMENT_PERIODIC_SNAPSHOT_ENABLED=${DOCUMENT_PERIODIC_SNAPSHOT_ENABLED:-true}
      - DOCUMENT_SNAPSHOT_INTERVAL_SECONDS=${DOCUMENT_SNAPSHOT_INTERVAL_SECONDS:-30}
      - DOCUMENT_EMPTY_ROOM_GRACE_SECONDS=${DOCUMENT_EMPTY_ROOM_GRACE_SECONDS:-5}
      - MAX_SNAPSHOT_BYTES=${MAX_SNAPSHOT_BYTES:-52428800}
      - AWS_S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ENDPOINT_URL=${AWS_ENDPOINT_URL:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
    volumes:
      - collab-snapshots:/data/collab-snapshots
    mem_limit: 384m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - briefly-internal

  planning-service:
    build:
      context: ./apps/backend/planning-service
      dockerfile: Dockerfile
    container_name: planning-service
    ports:
      - "8003:8003"
    environment:
      - SERVICE_PORT=8003
      - LOG_LEVEL=INFO
      - ENVIRONMENT=local
      - SHARED_SECRET=${SHARED_SECRET:-changeme}
      - PLANNING_STORE_TYPE=${PLANNING_STORE_TYPE:-inmemory}
      - PLANNING_DATABASE_URL=${PLANNING_DATABASE_URL:-}
    mem_limit: 128m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - briefly-internal

  schedule-service:
    build:
      context: ./apps/backend/schedule-service
      dockerfile: Dockerfile
    container_name: schedule-service
    ports:
      - "8006:8006"
    environment:
      - SERVICE_PORT=8006
      - LOG_LEVEL=INFO
      - ENVIRONMENT=local
      - SHARED_SECRET=${SHARED_SECRET:-changeme}
      - SUPABASE_URL=${SUPABASE_URL:-https://gcbwysprkqsfakaqsara.supabase.co}
      - SUPABASE_JWT_ISSUER=${SUPABASE_JWT_ISSUER:-https://gcbwysprkqsfakaqsara.supabase.co/auth/v1}
      - SUPABASE_JWT_AUDIENCE=authenticated
      - SUPABASE_AUTH_STRATEGY=jwks
      - SUPABASE_JWKS_URL=${SUPABASE_JWKS_URL:-https://gcbwysprkqsfakaqsara.supabase.co/auth/v1/.well-known/jwks.json}
      - WORKSPACE_SERVICE_URL=${WORKSPACE_SERVICE_URL:-http://workspace-service:8001}
      - SCHEDULE_STORE_TYPE=${SCHEDULE_STORE_TYPE:-inmemory}
      - SCHEDULE_DATABASE_URL=${SCHEDULE_DATABASE_URL:-}
    mem_limit: 128m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8006/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - briefly-internal

  intelligence-service:
    build:
      context: ./apps/backend/intelligence-service
      dockerfile: Dockerfile
    container_name: intelligence-service
    ports:
      - "8004:8004"
    environment:
      - SERVICE_PORT=8004
      - LOG_LEVEL=INFO
      - ENVIRONMENT=local
      - SHARED_SECRET=${SHARED_SECRET:-changeme}
    mem_limit: 128m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - briefly-internal

  utility-service:
    build:
      context: ./apps/backend/utility-service
      dockerfile: Dockerfile
    container_name: utility-service
    ports:
      - "8005:8005"
    environment:
      - SERVICE_PORT=8005
      - LOG_LEVEL=INFO
      - ENVIRONMENT=local
      - SHARED_SECRET=${SHARED_SECRET:-changeme}
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8005/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - briefly-internal

  # Optional Postgres for planning-service (used only when PLANNING_STORE_TYPE=postgres)
  planning-postgres:
    image: postgres:16-alpine
    container_name: planning-postgres
    environment:
      POSTGRES_DB: briefly_planning
      POSTGRES_USER: briefly
      POSTGRES_PASSWORD: ${PLANNING_DB_PASSWORD:-briefly_dev_password}
    ports:
      - "5433:5432"
    volumes:
      - pg-planning-data:/var/lib/postgresql/data
      - ./apps/backend/planning-service/init-workspace-db.sh:/docker-entrypoint-initdb.d/init-workspace-db.sh:ro
    mem_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U briefly -d briefly_planning"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - briefly-internal

  nginx:
    build:
      context: ./infra/nginx
      dockerfile: Dockerfile
    container_name: nginx
    ports:
      - "80:80"
    environment:
      - SHARED_SECRET=${SHARED_SECRET:-changeme}
    mem_limit: 64m
    depends_on:
      - workspace-service
      - collaboration-service
      - planning-service
      - intelligence-service
      - utility-service
    networks:
      - briefly-internal
    healthcheck:
      test: ["CMD-SHELL", "pgrep nginx && wget --spider -q http://127.0.0.1:80/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  briefly-internal:
    driver: bridge

volumes:
  collab-snapshots:
  pg-planning-data:
